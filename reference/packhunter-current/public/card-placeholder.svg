<svg xmlns="http://www.w3.org/2000/svg" width="367" height="512" viewBox="0 0 367 512">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="367" height="512" rx="12" ry="12" fill="url(#cardGrad)" stroke="#444" stroke-width="2"/>
  <!-- Border effect -->
  <rect x="10" y="10" width="347" height="492" rx="8" ry="8" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5,5"/>
  <!-- Pokeball icon -->
  <circle cx="183.5" cy="220" r="60" fill="none" stroke="#666" stroke-width="3"/>
  <line x1="123.5" y1="220" x2="243.5" y2="220" stroke="#666" stroke-width="3"/>
  <circle cx="183.5" cy="220" r="15" fill="#666"/>
  <!-- Text -->
  <text x="183.5" y="320" font-family="Arial, sans-serif" font-size="18" fill="#888" text-anchor="middle">Card Image</text>
  <text x="183.5" y="345" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Unavailable</text>
</svg>
